    th:hover { background: #2a2a4e; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    tr:hover { background: #f8f8f8; }
    tr.big-mover { background: #dcfce7; }
    tr.big-mover:hover { background: #bbf7d0; }
    tr.accuracy-drop { background: #fef2f2; }
    tr.accuracy-drop:hover { background: #fee2e2; }
    
    .delta { font-size: 0.75rem; font-weight: 600; }
    .delta.positive { color: #16a34a; }
    .delta.negative { color: #dc2626; }
    .delta.neutral { color: #666; }
    
    .score { display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .score.high { background: #dcfce7; color: #166534; }
    .score.mid { background: #fef9c3; color: #854d0e; }
    .score.low { background: #fee2e2; color: #991b1b; }
    
    .progress-bar { width: 60px; height: 8px; background: #e5e5e5; border-radius: 4px; overflow: hidden; display: inline-block; vertical-align: middle; margin-right: 8px; }
    .progress-fill { height: 100%; border-radius: 4px; }
    .progress-fill.high { background: #16a34a; }
    .progress-fill.mid { background: #eab308; }
    .progress-fill.low { background: #dc2626; }
    
    .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 0.7rem; font-weight: 600; margin-left: 5px; }
    .badge.complete { background: #dcfce7; color: #166534; }
    
    .legend { display: flex; gap: 20px; margin-bottom: 15px; font-size: 0.8rem; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-color { width: 16px; height: 16px; border-radius: 3px; }
    .legend-color.green { background: #dcfce7; }
    .legend-color.red { background: #fef2f2; }
    
    @media (max-width: 768px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .filters { flex-direction: column; align-items: stretch; }

</head>

let currentFilter = 'all';
let currentSort = { col: 'progress_delta', dir: 'desc' };
let courseFilter = '';

function getScoreClass(val) {
  if (val === null || val === undefined) return '';
  if (val >= 80) return 'high';
  if (val >= 65) return 'mid';
  return 'low';
}

function formatDelta(val) {
  if (val === null || val === undefined) return '<span class="delta neutral">—</span>';
  const sign = val > 0 ? '+' : '';
  const cls = val > 0 ? 'positive' : val < 0 ? 'negative' : 'neutral';
  return `<span class="delta ${cls}">${sign}${val.toFixed(1)}</span>`;
}

function formatScore(val) {
  if (val === null || val === undefined) return '—';
  return val.toFixed(1);
}

function filterData(d) {
  let filtered = [...d];
  
  if (courseFilter) {
    filtered = filtered.filter(r => r.course === courseFilter);
  }
  
  switch(currentFilter) {
    case 'movers':
      filtered = filtered.filter(r => r.progress_delta && r.progress_delta >= 5);
      break;
    case 'accuracy-up':
      filtered = filtered.filter(r => r.accuracy_delta && r.accuracy_delta > 0);
      break;
    case 'accuracy-down':
      filtered = filtered.filter(r => r.accuracy_delta && r.accuracy_delta < 0);
      break;
    case 'complete':
      filtered = filtered.filter(r => r.progress === 100);
      break;
  }
  
  return filtered;
}

function sortData(d) {
  return d.sort((a, b) => {
    let aVal = a[currentSort.col];
    let bVal = b[currentSort.col];
    if (aVal === null || aVal === undefined) aVal = currentSort.dir === 'desc' ? -Infinity : Infinity;
    if (bVal === null || bVal === undefined) bVal = currentSort.dir === 'desc' ? -Infinity : Infinity;
    if (typeof aVal === 'string') return currentSort.dir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
    return currentSort.dir === 'asc' ? aVal - bVal : bVal - aVal;
  });
}

function renderMetrics() {
  const totalEnrollments = data.length;
  const totalProgress = data.filter(r => r.progress_delta && r.progress_delta > 0).length;
  const bigMovers = data.filter(r => r.progress_delta && r.progress_delta >= 5).length;
  const accuracyUp = data.filter(r => r.accuracy_delta && r.accuracy_delta > 0).length;
  const accuracyDown = data.filter(r => r.accuracy_delta && r.accuracy_delta < 0).length;
  const complete = data.filter(r => r.progress === 100).length;
  
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-value">${totalEnrollments}</div><div class="metric-label">Total Enrollments</div></div>
    <div class="metric"><div class="metric-value blue">${totalProgress}</div><div class="metric-label">Made Progress Today</div></div>
    <div class="metric"><div class="metric-value green">${bigMovers}</div><div class="metric-label">Big Movers (≥5%)</div></div>
    <div class="metric"><div class="metric-value green">${accuracyUp}</div><div class="metric-label">Accuracy Up</div></div>
    <div class="metric"><div class="metric-value red">${accuracyDown}</div><div class="metric-label">Accuracy Down</div></div>
    <div class="metric"><div class="metric-value">${complete}</div><div class="metric-label">100% Complete</div></div>
  `;
}

function renderCourseFilter() {
  const courses = [...new Set(data.map(r => r.course))].sort();
  const sel = document.getElementById('courseFilter');
  sel.innerHTML = '<option value="">All Courses</option>' + courses.map(c => `<option value="${c}">${c}</option>`).join('');
}

function renderTable() {
  const filtered = sortData(filterData(data));
  const tbody = document.getElementById('tableBody');
  
  tbody.innerHTML = filtered.map(row => {
    const isMover = row.progress_delta && row.progress_delta >= 5;
    const accDrop = row.accuracy_delta && row.accuracy_delta <= -2;
    let rowClass = '';
    if (isMover) rowClass = 'big-mover';
    else if (accDrop) rowClass = 'accuracy-drop';
    
    const progressFill = row.progress || 0;
    const progressClass = progressFill >= 80 ? 'high' : progressFill >= 50 ? 'mid' : 'low';
    
    return `
      <tr class="${rowClass}">
        <td>${row.student}${row.progress === 100 ? '<span class="badge complete">✓</span>' : ''}</td>
        <td>${row.course}</td>
        <td><div class="progress-bar"><div class="progress-fill ${progressClass}" style="width:${progressFill}%"></div></div>${formatScore(row.progress)}%</td>
        <td>${formatDelta(row.progress_delta)}</td>
        <td><span class="score score-${getScoreClass(row.accuracy)}">${formatScore(row.accuracy)}</span></td>
        <td>${formatDelta(row.accuracy_delta)}</td>
        <td>${row.mcq !== null ? formatScore(row.mcq) : '—'}</td>
        <td>${row.frq !== null ? formatScore(row.frq) : '—'}</td>
      </tr>
    `;
  }).join('');
}

// Event listeners
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTable();
  });
});

document.getElementById('courseFilter').addEventListener('change', (e) => {
  courseFilter = e.target.value;
  renderTable();
});

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if (currentSort.col === col) {
      currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      currentSort.col = col;
      currentSort.dir = 'desc';
    }
    renderTable();
  });
});

// Initial render
renderMetrics();
renderCourseFilter();
renderTable();
</script>
