<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AP Course Progress Dashboard | Alpha School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f9fa;
      color: #1a1a1a;
      line-height: 1.5;
      padding: 2rem;
    }
    .container { max-width: 1600px; margin: 0 auto; }
    header { margin-bottom: 2rem; }
    h1 { font-size: 1.75rem; font-weight: 600; color: #111; margin-bottom: 0.25rem; }
    .subtitle { font-size: 0.875rem; color: #666; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
    .metric-card {
      background: #fff;
      border-radius: 12px;
      padding: 1rem;
      border: 1px solid #e5e7eb;
    }
    .metric-label { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .metric-value { font-size: 1.4rem; font-weight: 600; color: #111; }
    .filters {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }
    select, button {
      font-family: inherit;
      font-size: 0.875rem;
      padding: 0.5rem 0.875rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }
    select:hover, button:hover { border-color: #9ca3af; }
    button { background: #f9fafb; }
    .table-container {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    th {
      text-align: left;
      padding: 0.625rem 0.5rem;
      font-weight: 500;
      color: #666;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }
    th:hover { background: #f3f4f6; }
    th.sorted { color: #111; }
    td { padding: 0.5rem; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: #fafbfc; }
    .student-name { font-weight: 500; color: #111; white-space: nowrap; }
    .course { color: #444; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .progress-cell { min-width: 130px; }
    .progress-bar { display: flex; align-items: center; gap: 0.375rem; }
    .progress-track { flex: 1; height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; }
    .progress-value { font-weight: 500; font-size: 0.7rem; min-width: 38px; text-align: right; }
    .score { font-weight: 500; }
    .score-high { color: #0f766e; }
    .score-good { color: #0d9488; }
    .score-mid { color: #b45309; }
    .score-low { color: #c2410c; }
    .score-concern { color: #b91c1c; }
    .score-none { color: #ccc; }
    .fill-complete { background: #0d9488; }
    .fill-ontrack { background: #14b8a6; }
    .fill-progress { background: #f59e0b; }
    .fill-behind { background: #ea580c; }
    .fill-atrisk { background: #dc2626; }
    .proj-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .proj-5 { background: #059669; color: #fff; }
    .proj-4 { background: #0d9488; color: #fff; }
    .proj-3 { background: #f59e0b; color: #fff; }
    .proj-2 { background: #ea580c; color: #fff; }
    .proj-1 { background: #dc2626; color: #fff; }
    .proj-none { background: #e5e7eb; color: #999; }
    .empty-state { padding: 3rem; text-align: center; color: #888; }
    .data-date { font-size: 0.75rem; color: #999; margin-top: 1rem; text-align: right; }
    .legend { font-size: 0.7rem; color: #888; margin-top: 0.5rem; }
    @media (max-width: 768px) {
      body { padding: 1rem; }
      .metrics { grid-template-columns: repeat(2, 1fr); }
      table { min-width: 900px; }
    }
  </style>
</head>

function getStatusClass(pct) {
  if (pct >= 90) return 'complete';
  if (pct >= 50) return 'ontrack';
  if (pct >= 25) return 'progress';
  if (pct >= 10) return 'behind';
  return 'atrisk';
}

function getScoreClass(score) {
  if (score === null) return 'none';
  if (score >= 90) return 'high';
  if (score >= 80) return 'good';
  if (score >= 70) return 'mid';
  if (score >= 60) return 'low';
  return 'concern';
}

function formatScore(val) {
  return val !== null ? val.toFixed(1) : '—';
}

function render() {
  document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  let filtered = data;
  if (courseFilter !== 'All') filtered = filtered.filter(d => d.course === courseFilter);
  if (studentFilter !== 'All') filtered = filtered.filter(d => d.name === studentFilter);
  if (projFilter === 'Has Score') filtered = filtered.filter(d => d.proj !== null);
  if (projFilter === '5') filtered = filtered.filter(d => d.proj === 5);
  if (projFilter === '4') filtered = filtered.filter(d => d.proj === 4);
  if (projFilter === '3') filtered = filtered.filter(d => d.proj === 3);
  if (projFilter === '1-2') filtered = filtered.filter(d => d.proj === 1 || d.proj === 2);

  filtered = filtered.slice().sort((a, b) => {
    let av = a[sortField];
    let bv = b[sortField];
    if (av === null) av = -999;
    if (bv === null) bv = -999;
    if (typeof av === 'string') { av = av.toLowerCase(); bv = bv.toLowerCase(); }
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  // Metrics
  const total = filtered.length;
  const avgProgress = total > 0 ? (filtered.reduce((s, d) => s + (d.progress || 0), 0) / total).toFixed(1) : 0;
  const withAcc = filtered.filter(d => d.accuracy !== null);
  const avgAcc = withAcc.length > 0 ? (withAcc.reduce((s, d) => s + d.accuracy, 0) / withAcc.length).toFixed(1) : '—';
  const withProj = filtered.filter(d => d.proj !== null);
  const avgProj = withProj.length > 0 ? (withProj.reduce((s, d) => s + d.proj, 0) / withProj.length).toFixed(1) : '—';
  const proj5 = filtered.filter(d => d.proj === 5).length;
  const proj4 = filtered.filter(d => d.proj === 4).length;
  const proj3 = filtered.filter(d => d.proj === 3).length;
  const proj12 = filtered.filter(d => d.proj === 1 || d.proj === 2).length;

  document.getElementById('metrics').innerHTML = `
    <div class="metric-card"><div class="metric-label">Enrollments</div><div class="metric-value">${total}</div></div>
    <div class="metric-card"><div class="metric-label">Avg Progress</div><div class="metric-value">${avgProgress}%</div></div>
    <div class="metric-card"><div class="metric-label">Avg Accuracy</div><div class="metric-value">${avgAcc}%</div></div>
    <div class="metric-card"><div class="metric-label">Avg Proj Score</div><div class="metric-value">${avgProj}</div></div>
    <div class="metric-card"><div class="metric-label">Proj 5</div><div class="metric-value" style="color:#059669">${proj5}</div></div>
    <div class="metric-card"><div class="metric-label">Proj 4</div><div class="metric-value" style="color:#0d9488">${proj4}</div></div>
    <div class="metric-card"><div class="metric-label">Proj 3</div><div class="metric-value" style="color:#f59e0b">${proj3}</div></div>
    <div class="metric-card"><div class="metric-label">Proj 1-2</div><div class="metric-value" style="color:#dc2626">${proj12}</div></div>
  `;

  // Filters
  document.getElementById('filters').innerHTML = `
    <select id="course-select">${courses.map(c => `<option value="${c}" ${c === courseFilter ? 'selected' : ''}>${c === 'All' ? 'All courses' : c}</option>`).join('')}</select>
    <select id="student-select">${students.map(s => `<option value="${s}" ${s === studentFilter ? 'selected' : ''}>${s === 'All' ? 'All students' : s}</option>`).join('')}</select>
    <select id="proj-select">
      <option value="All" ${projFilter === 'All' ? 'selected' : ''}>All proj scores</option>
      <option value="Has Score" ${projFilter === 'Has Score' ? 'selected' : ''}>Has proj score</option>
      <option value="5" ${projFilter === '5' ? 'selected' : ''}>Proj 5</option>
      <option value="4" ${projFilter === '4' ? 'selected' : ''}>Proj 4</option>
      <option value="3" ${projFilter === '3' ? 'selected' : ''}>Proj 3</option>
      <option value="1-2" ${projFilter === '1-2' ? 'selected' : ''}>Proj 1-2 (at risk)</option>
    </select>
    <button id="reset-btn">Reset</button>
  `;

  document.getElementById('course-select').onchange = e => { courseFilter = e.target.value; render(); };
  document.getElementById('student-select').onchange = e => { studentFilter = e.target.value; render(); };
  document.getElementById('proj-select').onchange = e => { projFilter = e.target.value; render(); };
  document.getElementById('reset-btn').onclick = () => { courseFilter = 'All'; studentFilter = 'All'; projFilter = 'All'; render(); };

  // Table head
  const sortIcon = field => sortField === field ? (sortDir === 'asc' ? ' ↑' : ' ↓') : '';
  document.getElementById('table-head').innerHTML = `
    <tr>
      <th data-sort="name" class="${sortField === 'name' ? 'sorted' : ''}">Student${sortIcon('name')}</th>
      <th data-sort="course" class="${sortField === 'course' ? 'sorted' : ''}">Course${sortIcon('course')}</th>
      <th data-sort="progress" class="${sortField === 'progress' ? 'sorted' : ''}">Progress${sortIcon('progress')}</th>
      <th data-sort="proj" class="${sortField === 'proj' ? 'sorted' : ''}">Proj${sortIcon('proj')}</th>
      <th data-sort="accuracy" class="${sortField === 'accuracy' ? 'sorted' : ''}">Accuracy${sortIcon('accuracy')}</th>
      <th data-sort="mcq" class="${sortField === 'mcq' ? 'sorted' : ''}">MCQ${sortIcon('mcq')}</th>
      <th data-sort="frq" class="${sortField === 'frq' ? 'sorted' : ''}">FRQ${sortIcon('frq')}</th>
    </tr>
  `;

  document.querySelectorAll('#table-head th').forEach(th => {
    if (!th.dataset.sort) return;
    th.onclick = () => {
      const field = th.dataset.sort;
      if (sortField === field) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortField = field;
        sortDir = field === 'name' || field === 'course' ? 'asc' : 'desc';
      }
      render();
    };
  });

  // Table body
  if (filtered.length === 0) {
    document.getElementById('table-body').innerHTML = '';
    document.getElementById('empty-state').style.display = 'block';
  } else {
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('table-body').innerHTML = filtered.map(row => {
      const status = getStatusClass(row.progress);
      const pctDisplay = Math.min(100, Math.max(0, row.progress));
      const projClass = row.proj !== null ? `proj-${row.proj}` : 'proj-none';
      return `
        <tr>
          <td class="student-name">${row.name}</td>
          <td class="course" title="${row.course}">${row.course}</td>
          <td class="progress-cell">
            <div class="progress-bar">
              <div class="progress-track"><div class="progress-fill fill-${status}" style="width:${pctDisplay}%"></div></div>
              <span class="progress-value score-${status}">${row.progress.toFixed(1)}%</span>
            </div>
          </td>
          <td class="num"><span class="proj-badge ${projClass}">${row.proj !== null ? row.proj : '—'}</span></td>
          <td class="num"><span class="score score-${getScoreClass(row.accuracy)}">${formatScore(row.accuracy)}</span></td>
          <td class="num"><span class="score score-${getScoreClass(row.mcq)}">${formatScore(row.mcq)}</span></td>
          <td class="num"><span class="score score-${getScoreClass(row.frq)}">${formatScore(row.frq)}</span></td>
        </tr>
      `;
    }).join('');
  }
}

render();
</script>
</body>
</html>
